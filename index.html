<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOLTV | CS2 Tier-6 Portal</title>
    <style>
        :root {
            --main-bg: #080808; 
            --panel-bg: rgba(20, 20, 20, 0.9); 
            --accent: #d1c7a7;
            --text: #e0e0e0;
            --border: #333;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --elo-red: #ff3e3e;
            --elo-green: #4caf50;
        }

        body { 
            background-color: var(--main-bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
        }

        nav { 
            background: rgba(15, 15, 15, 0.95);
            border-bottom: 2px solid var(--accent); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            backdrop-filter: blur(5px);
        }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; }
        .logo-text { font-weight: bold; font-size: 20px; padding: 15px 20px; background: var(--accent); color: #000; text-decoration: none; }
        .menu { display: flex; }
        .menu a { color: #bbb; text-decoration: none; padding: 18px 20px; text-transform: uppercase; font-size: 14px; font-weight: bold; display: inline-block; transition: 0.2s; }
        .menu a:hover { background: rgba(30, 30, 30, 0.8); color: #fff; }

        .container { max-width: 1100px; margin: 20px auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 0 10px; position: relative; z-index: 1; }
        .section { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }

        .card, .profile-view, .sidebar { 
            background: var(--panel-bg); 
            border: 1px solid var(--border); 
            margin-bottom: 15px; 
            padding: 20px; 
            backdrop-filter: blur(3px);
            border-radius: 4px;
        }
        .card h2 { margin-top: 0; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 12px; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(10, 10, 10, 0.5); }
        th { text-align: left; color: var(--accent); padding: 12px; border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px 12px; border-bottom: 1px solid rgba(51, 51, 51, 0.5); font-size: 14px; }
        .clickable { color: #fff; cursor: pointer; font-weight: bold; text-decoration: none; transition: 0.2s; }
        .clickable:hover { color: var(--accent); }

        .profile-view { display: none; animation: fadeIn 0.4s; padding: 0; overflow: hidden; }
        .profile-header { display: flex; background: rgba(15, 15, 15, 0.95); padding: 30px; border-bottom: 2px solid var(--accent); }
        .profile-img { width: 180px; height: 180px; background: #202020; border: 2px solid var(--border); object-fit: cover; border-radius: 4px; }
        
        .profile-main-info { margin-left: 35px; flex-grow: 1; }
        .profile-main-info h1 { margin: 0; font-size: 42px; color: #fff; line-height: 1; letter-spacing: 1px; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 25px; }
        .info-box { background: rgba(30, 30, 30, 0.8); padding: 15px; border-radius: 4px; border-left: 3px solid var(--accent); }
        .info-label { display: block; color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .info-value { font-weight: bold; font-size: 16px; color: #fff; }

        .achievements-list { list-style: none; padding: 0; margin: 0; }
        .achievement-item { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(30, 30, 30, 0.7); margin-bottom: 6px; border-radius: 3px; font-size: 14px; border: 1px solid rgba(51, 51, 51, 0.3); }
        .place-1 { color: var(--gold); font-weight: bold; }
        .place-2 { color: var(--silver); font-weight: bold; }
        .place-3 { color: var(--bronze); font-weight: bold; }

        .back-btn { background: #282828; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin: 15px; font-size: 12px; border-radius: 2px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .role-badge { background: #333; color: #fff; padding: 3px 7px; border-radius: 3px; font-size: 10px; margin-left: 6px; vertical-align: middle; text-transform: uppercase; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
    <div class="nav-container">
        <a href="#" class="logo-text" onclick="showSection('home')">ECHOLTV</a>
        <div class="menu">
            <a href="#" onclick="showSection('news')">Новости</a>
            <a href="#" onclick="showSection('players')">Игроки</a>
            <a href="#" onclick="showSection('teams')">Команды</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="content-main">
        
        <div id="home" class="section active">
            <div class="card">
                <h2>ECHOLTV</h2>
                <p>Твой Tier-6 хаб статистики. Перейди в разделы "Игроки" или "Команды", чтобы увидеть изменения.</p>
            </div>
        </div>

        <div id="players" class="section">
            <div id="players-list-view">
                <div class="card">
                    <h2>База игроков</h2>
                    <table>
                        <thead>
                            <tr><th>Игрок</th><th>ELO</th><th>RATING</th><th>Команда</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="clickable" onclick="showPlayer('spokyso')">spokyso</span> <span class="role-badge">IGL</span></td>
                                <td style="color: var(--elo-red); font-weight: bold;">2100</td>
                                <td style="color: var(--gold); font-weight: bold;">600</td>
                                <td>Echofall</td>
                            </tr>
                            <tr>
                                <td><span class="clickable" onclick="showPlayer('frost')">fR0-ST</span> <span class="role-badge">IGL</span></td>
                                <td style="color: var(--elo-green); font-weight: bold;">969</td>
                                <td style="color: var(--gold); font-weight: bold;">-</td>
                                <td>-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="player-profile-view" class="profile-view">
                <button class="back-btn" onclick="hideAllProfiles()">← НАЗАД К СПИСКУ</button>
                <div id="profile-content"></div>
            </div>
        </div>

        <div id="teams" class="section">
            <div class="card">
                <h2>Мировой рейтинг Tier-6</h2>
                <table>
                    <thead><tr><th>Команда</th><th>RATING</th></tr></thead>
                    <tbody>
                        <tr><td>Echofall</td><td style="color: var(--accent); font-weight: bold;">600</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
    <div class="sidebar card"><h3>Матчи LIVE</h3><p>Событий нет</p></div>
</div>

<script>
    // Настройки фона (сокращено для экономии места)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); requestAnimationFrame(animate); }
    animate();

    const playersData = {
        'spokyso': {
            name: 'spokyso',
            realName: 'Юра',
            elo: 2100,
            eloColor: 'var(--elo-red)',
            rating: 600,
            age: 18,
            role: 'Rifler / IGL',
            achievements: [
                {n: "B7 Tournament", p: 1}, {n: "Aquex cup", p: 2}, {n: "Blasty Open Winter", p: 1},
                {n: "IPE Major", p: 2}, {n: "AVENTUS Cup", p: 1}, {n: "Cupix Open March", p: 1}, {n: "LTL Liga Cup", p: 1}
            ]
        },
        'frost': {
            name: 'fR0-ST',
            realName: 'Игрок',
            elo: 969,
            eloColor: 'var(--elo-green)',
            rating: 'TBA',
            age: 14,
            role: 'IGL',
            achievements: [
                {n: "nxt academi cup", p: 2},
                {n: "LTL liga cup", p: 3}
            ]
        }
    };

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        hideAllProfiles();
    }

    function showPlayer(key) {
        const p = playersData[key];
        document.getElementById('players-list-view').style.display = 'none';
        const view = document.getElementById('player-profile-view');
        view.style.display = 'block';
        
        document.getElementById('profile-content').innerHTML = `
            <div class="profile-header">
                <div class="profile-main-info">
                    <h1>${p.name}</h1>
                    <p>${p.realName}</p>
                </div>
            </div>
            <div class="profile-grid">
                <div class="info-box"><span class="info-label">ELO</span><span class="info-value" style="color:${p.eloColor}">${p.elo}</span></div>
                <div class="info-box"><span class="info-label">Rating</span><span class="info-value" style="color:var(--gold)">${p.rating}</span></div>
                <div class="info-box"><span class="info-label">Возраст</span><span class="info-value">${p.age}</span></div>
                <div class="info-box"><span class="info-label">Роль</span><span class="info-value">${p.role}</span></div>
            </div>
            <div class="card" style="margin: 20px;">
                <h3>Достижения</h3>
                <ul class="achievements-list">
                    ${p.achievements.map(a => `
                        <li class="achievement-item">
                            <span>${a.n}</span>
                            <span class="place-${a.p}">${a.p === 1 ? '🥇 1st' : a.p === 2 ? '🥈 2nd' : '🥉 3rd'}</span>
                        </li>
                    `).join('')}
                </ul>
            </div>
        `;
    }

    function hideAllProfiles() {
        document.getElementById('players-list-view').style.display = 'block';
        document.getElementById('player-profile-view').style.display = 'none';
    }
</script>
</body>
</html>
